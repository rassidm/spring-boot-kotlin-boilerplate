spring:
  config:
    activate:
      on-profile: common
  mvc:
    log-resolved-exception: false
  web:
    resources.add-mappings: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    generate-ddl: false
    properties:
      "[hibernate.jdbc.time_zone]": UTC
  http:
    reactiveclient:
      connector: reactor
      connect-timeout: 3s
      read-timeout: 5s
      redirects: dont-follow
server:
  servlet:
    encoding:
      force-response: true
  error:
    include-exception: false
    include-message: always
    include-stacktrace: ON_PARAM
    whitelabel.enabled: false
  port: 8085
springdoc:
  show-actuator: true
  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    path: /swagger.html
    groups-order: DESC
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    disable-swagger-default-url: true
    doc-expansion: none
  api-docs:
    path: /api-docs
  cache:
    disabled: true
  model-and-view-allowed: true
sentry:
  traces-sample-rate: 1.0
  exception-resolver-order: -2147483647
  max-request-body-size: always
  send-default-pii: true
  logging:
    minimum-event-level: ERROR
    minimum-breadcrumb-level: DEBUG
    enabled: true
logging:
  pattern:
    console: "[%cyan(%d{yyyy-MM-dd HH:mm:ss.SSS})][%highlight(%thread)][%clr(%-5level)][%clr(${PID:-})][%highlight(%logger.%method:line%line)] - %msg%n"
webhook:
  enabled: true
  slack:
    url: ""
  discord:
    url: ""
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
        exclude: env, heapdump, threaddump, configprops, flyway, loggers, liquibase, mappings, scheduledtasks, sessions, shutdown, jolokia, logfile
  endpoint:
    prometheus:
      access: READ_ONLY
    health:
      show-details: when-authorized
      show-components: when-authorized
    info:
      access: READ_ONLY
    metrics:
      access: READ_ONLY

